<html>
    <head>
        <title>Database</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="css/style.css" rel="stylesheet" type="text/css"/>
        <script src = "javascript/tag_manager.js"></script>
        <script src = "javascript/fetch_goals.js"></script>
        <script src = "javascript/modalsAndMenu_logic.js"></script>
        <script src = "javascript/modify.js"></script>
    </head>
    <body>
            <button id="hamburgerButton" onclick="toggleMenu()">☰</button>
        
        <nav id = "navMenu">
            <h1>UN SDG - Dashboard</h1>
            <div id="navButtons">
            <button class="card" onclick = "openDatabaseTable()">Database Table</button>
            <button class="card" onclick = "openTagManager()">Tags Manager</button>
            <button class="card" onclick = "openAddManager()">Add Target</button>
            </div>
        </nav>
        <dialog id = "infoModal" class="card">
                <button type="button" id = "closeInfoModal" class="close_btn">Close</button>
                <div id = "infoModalContent"></div>
        </dialog>
       
        <dialog id="deleteModal">
            <div><h2>Delete Confirmation</h2></div>
            <div><p id="messageDelete"></p></div>
            <div>
                <button id="confirmDelete" class = "delete_btn" onclick = "completeDelete()">Delete</button>
                <button type="button" id="cancelDelete" onclick="closeDeleteConfirmationWindow()">Cancel</button>
            </div>
        </dialog>
        <!-- Table/Cards -->
        <div id= "databaseTable"></div>
        <!-- _______________TAG MANAGER_______________ -->
        <div id = "tagManager" class="page">
            <br>
            <h2> Tag manager</h2>
            <div class="card">
                <input type = "text" id = "tagInput" placeholder = "Enter new tag" oninput="removeWarning()">
                    <p id = "tagInput_error" class = "error"></p>
                <button id = "addTagButton" onclick = "addTag()">Add Tag</button>
                <button id = "removeTagButton" onclick = "removeTag()">Remove Tag</button>
                <button id = "modifyTagButton" onclick = "openModifyTagModal()">Modify Tag</button>
            </div>
            
            <dialog id = "modifyTagModal" class="card">
                <button id = "closeModifyTag" onclick = "closeModifyTagModal()">Close</button>
                <input type = "text" id = "tagToModify" placeholder = "Tag to edit">
                    <p id = "tagToModify_error" class = "error"></p>
                <input type = "text" id = "newModifiedTag" placeholder = "New edited tag">
                <button id = "submitModifyTag" onclick = "submitModifyTag()">Submit</button>
            </dialog>
            <div id = "tagManagerContent" class="card"></div>
        </div>
        <!-- _______________ADD TARGET_______________-->
        <div id="addManager" class="page">
            <h2>Add Target</h2>
            <p id="addTarget_error" style="color:red;"></p>
            <form id="addManagerForm">
                <div class="card">
                <label>Target Number</label>
                <input type="text" id="targetNumber" placeholder="Number">
                <p class="error" id="targetNumberError"></p>

                <label>Target Description</label>
                <textarea id="targetDescription" placeholder="Target description"></textarea>
                <p class="error" id="targetDescriptionError"></p>
                </div>
                
                <div class="card">
                <label>Title</label>
                <input type="text" id="targetTitle" placeholder="Title">
                <p class="error" id="targetTitleError"></p>

                <label>Description</label>
                <textarea id="targetDescriptionDetail" placeholder="Description"></textarea>
                <p class="error" id="targetDescriptionDetailError"></p>

                <label>Images</label>
                <input type="file" id="targetImages" accept="image/*" multiple>
                <p class="error" id="targetImagesError"></p>

                <label>Tags</label>
                <input type="text" id="targetTags" placeholder="Tags">
                <p class="error" id="targetTagsError"></p>
                </div>
                
                <div class="card">
                <h3>Available Tags</h3>
                <div id="displayAvailableTags"></div>
                </div>

                <button type="submit" class="button">Submit</button>
            </form>
        </div>
        <!-- _______________MODIFY TARGET_______________-->
        <div id="editTargetWindow" class="page"></div>
    </body>
</html>
